<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Prompt & Confirm | User Interaction</title>
  </head>
  <body>
    <script>
        prompt("Enter You Email & Password of your Accounts with Platform name"); //Used to take user input as string
        confirm("Are you Sure You want to send this data to server")//Shows a message and waits for the user to press ok or cancel . Returns true for OK and false for cancel.
        alert("Hello Your Data Was Hacked Successfully."); // Used to invoke a mini window with a massage
    </script>
  </body>
</html>
